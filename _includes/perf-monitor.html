<!-- NDS Perf Monitor — inlined for earliest execution -->
<script>
(function () {
    'use strict';
    if (window.__ndsPerf) return;

    // ── Helpers ─────────────────────────────────────────────────────
    var MAX = 200, logLines = [], pending = [];
    var logEl, fpsEl, domEl, memEl;

    function elKey(el) {
        if (!el || !el.tagName) return 'window';
        var tag = el.tagName.toLowerCase(), cn = el.className;
        if (typeof cn === 'string' && cn) {
            var cl = cn.split(/\s+/).filter(function (x) {
                return x && (x.indexOf('nds-') === 0 || x.indexOf('hgi') === 0 || x.indexOf('nav') === 0 || x.indexOf('side') === 0);
            }).slice(0, 2);
            if (cl.length) return tag + '.' + cl.join('.');
        }
        return el.id ? tag + '#' + el.id : tag;
    }

    function caller() {
        var lines = ((new Error()).stack || '').split('\n');
        for (var i = 2; i < lines.length; i++) {
            if (lines[i].indexOf('nds-perf') !== -1) continue;
            var m = lines[i].match(/(?:at\s+)?(?:.*?\s+\()?(.+?):(\d+)(?::\d+)?\)?$/);
            if (m) return m[1].split('/').pop().split('?')[0] + ':' + m[2];
        }
        return '?';
    }

    function log(text, cls) {
        var ts = '+' + (performance.now() / 1000).toFixed(2) + 's  ';
        if (!logEl) { pending.push([text, cls, ts]); return; }
        logLines.push(ts + text);
        if (logLines.length > MAX) logLines.shift();
        var el = document.createElement('div');
        if (cls) el.className = cls;
        el.textContent = ts + text;
        logEl.appendChild(el);
        while (logEl.children.length > MAX) logEl.removeChild(logEl.firstChild);
        if (logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 60) logEl.scrollTop = logEl.scrollHeight;
    }

    // ── Panel UI ────────────────────────────────────────────────────
    var panel = document.createElement('div');
    panel.id = 'nds-perf';
    panel.innerHTML = [
        '<style>',
        '#nds-perf{position:fixed;z-index:999999;font:11px/1.4 monospace;background:rgba(0,0,0,.9);color:#ccc;max-height:40vh;display:flex;flex-direction:column;touch-action:pan-y;user-select:text;-webkit-user-select:text;inset-inline:0;}',
        '#nds-perf.bottom{inset-block-end:0;inset-block-start:auto;}',
        '#nds-perf.top{inset-block-start:0;inset-block-end:auto;}',
        '#nds-perf.hide #nds-perf-log{display:none;}',
        '#nds-perf-bar{display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(0,0,0,.95);flex-shrink:0;}',
        '#nds-perf-bar span{white-space:nowrap;}',
        '.pf{font-weight:bold;font-size:13px;min-width:52px;}',
        '.pm{font-size:10px;padding:2px 5px;border-radius:3px;background:rgba(255,255,255,.08);}',
        '.sp{flex:1;}',
        '#nds-perf-btns{display:flex;gap:4px;padding:4px 10px;border-bottom:1px solid #333;flex-shrink:0;background:rgba(0,0,0,.95);}',
        '#nds-perf-btns button{background:#333;color:#fff;border:none;border-radius:4px;padding:4px 8px;font:11px monospace;cursor:pointer;touch-action:manipulation;min-height:28px;}',
        '#nds-perf-btns button:active{background:#555;}',
        '#nds-perf-log{overflow-y:auto;padding:4px 10px 10px;flex:1;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}',
        '#nds-perf-log div{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.05);word-break:break-all;}',
        '.g{color:#4caf50;}.w{color:#ff9800;}.b{color:#f44336;}.i{color:#64b5f6;}.d{color:#777;}',
        '</style>',
        '<div id="nds-perf-bar">',
        '  <span class="pf" id="pf-fps">-- FPS</span>',
        '  <span class="pm" id="pf-dom">DOM --</span>',
        '  <span class="pm" id="pf-mem"></span>',
        '  <span class="sp"></span>',
        '</div>',
        '<div id="nds-perf-btns">',
        '  <button id="pf-tog">Hide</button>',
        '  <button id="pf-pos">&#8597;</button>',
        '  <button id="pf-cpy">Copy</button>',
        '  <button id="pf-cls">Clear</button>',
        '  <button id="pf-x">X</button>',
        '</div>',
        '<div id="nds-perf-log"></div>'
    ].join('');

    panel.classList.add(localStorage._pfPos === 'top' ? 'top' : 'bottom');
    if (localStorage._pfHide === '1') panel.classList.add('hide');

    // ── Mount ───────────────────────────────────────────────────────
    function mount() {
        if (logEl || !document.body) return;
        document.body.appendChild(panel);
        logEl = document.getElementById('nds-perf-log');
        fpsEl = document.getElementById('pf-fps');
        domEl = document.getElementById('pf-dom');
        memEl = document.getElementById('pf-mem');

        // Flush pending logs
        for (var i = 0; i < pending.length; i++) {
            var p = pending[i], ts = p[2];
            logLines.push(ts + p[0]);
            if (logLines.length > MAX) logLines.shift();
            var el = document.createElement('div');
            if (p[1]) el.className = p[1];
            el.textContent = ts + p[0];
            logEl.appendChild(el);
        }
        pending = [];

        // Button handlers
        var $ = document.getElementById.bind(document);

        $('pf-tog').addEventListener('click', function () {
            var h = panel.classList.toggle('hide');
            this.textContent = h ? 'Show' : 'Hide';
            localStorage._pfHide = h ? '1' : '0';
        });
        if (localStorage._pfHide === '1') $('pf-tog').textContent = 'Show';

        $('pf-pos').addEventListener('click', function () {
            var t = panel.classList.toggle('top');
            panel.classList.toggle('bottom', !t);
            localStorage._pfPos = t ? 'top' : 'bottom';
        });

        $('pf-x').addEventListener('click', function () {
            if (window.__ndsPerf) window.__ndsPerf.stop();
            panel.remove();
        });

        $('pf-cpy').addEventListener('click', function () {
            var bar = (domEl ? domEl.textContent : '') + (memEl && memEl.textContent ? '  ' + memEl.textContent : '');
            var text = (logLines.length ? logLines[0] + '\n' + bar + '\n' : '') + logLines.slice(1).join('\n');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function () { fb('Copied!'); }, function () { fb('Failed'); });
            } else {
                var ta = document.createElement('textarea');
                ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
                document.body.appendChild(ta); ta.focus(); ta.select();
                try { document.execCommand('copy'); fb('Copied!'); } catch (e) { fb('Failed'); }
                document.body.removeChild(ta);
            }
            function fb(m) { var b = $('pf-cpy'), o = b.textContent; b.textContent = m; setTimeout(function () { b.textContent = o; }, 1000); }
        });

        $('pf-cls').addEventListener('click', function () { logEl.innerHTML = ''; logLines = []; });
    }

    if (document.body) mount(); else document.addEventListener('DOMContentLoaded', mount);

    // ── 1. FPS ──────────────────────────────────────────────────────
    var frames = 0, lastT = performance.now(), minFps = Infinity, fpsH = [], curFps = 0;

    function fpsLoop(now) {
        frames++;
        if (now - lastT >= 1000) {
            curFps = Math.round((frames * 1000) / (now - lastT));
            fpsH.push(curFps); if (fpsH.length > 60) fpsH.shift();
            minFps = Math.min(minFps, curFps);
            if (fpsEl) { fpsEl.textContent = curFps + ' FPS'; fpsEl.style.color = curFps >= 55 ? '#4caf50' : curFps >= 30 ? '#ff9800' : '#f44336'; }
            if (curFps < 30) log('FPS DROP  ' + curFps + ' (min: ' + minFps + ')', 'b');
            frames = 0; lastT = now;
        }
        rafId = requestAnimationFrame(fpsLoop);
    }
    var rafId = requestAnimationFrame(fpsLoop);

    // ── 2. CLS ──────────────────────────────────────────────────────
    var clsTotal = 0;
    if (typeof PerformanceObserver !== 'undefined') {
        try {
            new PerformanceObserver(function (l) {
                l.getEntries().forEach(function (e) {
                    if (!e.hadRecentInput) {
                        clsTotal += e.value;
                        if (e.value > 0.05) {
                            log('CLS  ' + e.value.toFixed(4) + '  (total: ' + clsTotal.toFixed(4) + ')', 'w');
                            if (e.sources) e.sources.slice(0, 2).forEach(function (s) {
                                if (s.node) log('  → ' + elKey(s.node), 'd');
                            });
                        }
                    }
                });
            }).observe({ type: 'layout-shift', buffered: true });
        } catch (e) { }
    }

    // ── 3. Reflows ──────────────────────────────────────────────────
    var reflowN = 0, elMap = {}, SAMPLE = 20;

    var _gcs = window.getComputedStyle;
    window.getComputedStyle = function () {
        reflowN++;
        if (reflowN % SAMPLE === 0) { var k = elKey(arguments[0]) + ' [style]'; elMap[k] = (elMap[k] || 0) + 1; }
        return _gcs.apply(this, arguments);
    };

    var _gbcr = Element.prototype.getBoundingClientRect;
    Element.prototype.getBoundingClientRect = function () {
        reflowN++;
        if (reflowN % SAMPLE === 0) { var k = elKey(this) + ' [rect]'; elMap[k] = (elMap[k] || 0) + 1; }
        return _gbcr.apply(this, arguments);
    };

    setInterval(function () {
        if (reflowN > 30) {
            log('REFLOWS  ' + reflowN + '/s', reflowN > 60 ? 'b' : 'w');
            var keys = Object.keys(elMap).sort(function (a, b) { return elMap[b] - elMap[a]; });
            for (var i = 0; i < Math.min(keys.length, 3); i++)
                log('  → ' + keys[i] + '  x' + (elMap[keys[i]] * SAMPLE), 'd');
        }
        elMap = {}; reflowN = 0;
    }, 1000);

    // ── 4. Slow Input (INP) ─────────────────────────────────────────
    if (typeof PerformanceObserver !== 'undefined') {
        try {
            new PerformanceObserver(function (l) {
                l.getEntries().forEach(function (e) {
                    var d = Math.round(e.duration);
                    if (d > 200) log('SLOW INPUT  ' + e.name + '  ' + d + 'ms', d > 500 ? 'b' : 'w');
                });
            }).observe({ type: 'event', buffered: true, durationThreshold: 100 });
        } catch (e) { }
    }

    // ── 5. Long Tasks (LoAF with script attribution, fallback to longtask)
    if (typeof PerformanceObserver !== 'undefined') {
        var loafOk = false;
        try {
            new PerformanceObserver(function (l) {
                l.getEntries().forEach(function (e) {
                    var d = Math.round(e.duration);
                    if (d < 100) return;
                    var label = 'LONG TASK  ' + d + 'ms';
                    if (e.scripts && e.scripts.length) {
                        for (var i = 0; i < e.scripts.length; i++) {
                            var s = e.scripts[i], src = s.sourceURL || '', fn = s.sourceFunctionName || '';
                            if (src) { var p = src.split('/'); src = p[p.length - 1].split('?')[0]; }
                            if (src || fn) label += '  → ' + (fn || '') + (fn && src ? ' ' : '') + (src ? '(' + src + ')' : '');
                        }
                    }
                    log(label, d > 200 ? 'b' : 'w');
                });
            }).observe({ type: 'long-animation-frame', buffered: true });
            loafOk = true;
        } catch (e) { }
        if (!loafOk) {
            try {
                new PerformanceObserver(function (l) {
                    l.getEntries().forEach(function (e) {
                        var d = Math.round(e.duration);
                        if (d > 100) log('LONG TASK  ' + d + 'ms', d > 200 ? 'b' : 'w');
                    });
                }).observe({ type: 'longtask', buffered: true });
            } catch (e) { }
        }
    }

    // ── 6. Scroll Jank ──────────────────────────────────────────────
    var janks = 0, lastScrl = 0, idle = true, idleTmr, tchStart = 0, scrlLogged = false;

    window.addEventListener('touchstart', function () { tchStart = performance.now(); scrlLogged = false; }, { passive: true });
    window.addEventListener('wheel', function () { if (idle) { tchStart = performance.now(); scrlLogged = false; } }, { passive: true });

    window.addEventListener('scroll', function () {
        var now = performance.now();
        if (idle && tchStart && !scrlLogged) {
            var delay = now - tchStart; scrlLogged = true;
            if (delay > 50) { janks++; log('SCROLL START  ' + Math.round(delay) + 'ms  (#' + janks + ')', delay > 150 ? 'b' : 'w'); }
        }
        if (!idle && lastScrl && now - lastScrl > 50) { janks++; log('SCROLL GAP  ' + Math.round(now - lastScrl) + 'ms  (#' + janks + ')', 'b'); }
        idle = false; lastScrl = now;
        clearTimeout(idleTmr);
        idleTmr = setTimeout(function () { idle = true; lastScrl = tchStart = 0; }, 150);
    }, { passive: true });

    // ── 7. Observer & Event Tracking ────────────────────────────────
    var obsLog = {}, evtLog = {}, rId = 0, mId = 0, iId = 0;

    // ResizeObserver
    var _RO;
    if (window.ResizeObserver) {
        _RO = window.ResizeObserver;
        window.ResizeObserver = function (cb) {
            var src = caller(), id = 'R' + (++rId);
            var inst = new _RO(function (entries, obs) {
                var t0 = performance.now();
                cb(entries, obs);
                var dur = performance.now() - t0;
                obsLog.resize = (obsLog.resize || 0) + 1;
                if (dur > 5) log('RESIZE OBS  ' + Math.round(dur) + 'ms  → ' + (entries[0] ? elKey(entries[0].target) : '?') + '  ← ' + src, dur > 16 ? 'b' : 'w');
            });
            var _obs = inst.observe.bind(inst);
            inst.observe = function (el) { log('OBSERVE Resize #' + id + '  → ' + elKey(el) + '  ← ' + src, 'd'); return _obs(el); };
            return inst;
        };
        window.ResizeObserver.prototype = _RO.prototype;
    }

    // MutationObserver
    var _MO = window.MutationObserver;
    window.MutationObserver = function (cb) {
        var src = caller(), id = 'M' + (++mId), target = null;
        var inst = new _MO(function (mutations, obs) {
            var real = mutations.filter(function (m) { return !panel.contains(m.target); });
            if (!real.length) return cb(mutations, obs);
            var t0 = performance.now();
            cb(mutations, obs);
            var dur = performance.now() - t0;
            obsLog.mutation = (obsLog.mutation || 0) + 1;
            if (dur > 5) log('MUTATION OBS  ' + Math.round(dur) + 'ms  (' + real.length + ' mutations)  → ' + (target ? elKey(target) : '?') + '  ← ' + src, dur > 16 ? 'b' : 'w');
        });
        var _obs = inst.observe.bind(inst);
        inst.observe = function (el, o) { target = el; log('OBSERVE Mutation #' + id + '  → ' + elKey(el) + '  ← ' + src, 'd'); return _obs(el, o); };
        return inst;
    };
    window.MutationObserver.prototype = _MO.prototype;

    // IntersectionObserver
    var _IO;
    if (window.IntersectionObserver) {
        _IO = window.IntersectionObserver;
        window.IntersectionObserver = function (cb, opts) {
            var src = caller(), id = 'I' + (++iId);
            var inst = new _IO(function (entries, obs) {
                var t0 = performance.now();
                cb(entries, obs);
                var dur = performance.now() - t0;
                obsLog.intersection = (obsLog.intersection || 0) + 1;
                if (dur > 5) log('INTERSECT OBS  ' + Math.round(dur) + 'ms  → ' + (entries[0] ? elKey(entries[0].target) : '?') + '  ← ' + src, dur > 16 ? 'b' : 'w');
            }, opts);
            var _obs = inst.observe.bind(inst);
            inst.observe = function (el) { log('OBSERVE Intersect #' + id + '  → ' + elKey(el) + '  ← ' + src, 'd'); return _obs(el); };
            return inst;
        };
        window.IntersectionObserver.prototype = _IO.prototype;
    }

    // High-frequency event listeners
    var hotEvents = { scroll: 1, resize: 1, mousemove: 1, touchmove: 1, pointermove: 1 };
    var _ael = EventTarget.prototype.addEventListener;
    EventTarget.prototype.addEventListener = function (type) {
        if (hotEvents[type]) {
            evtLog[type] = (evtLog[type] || 0) + 1;
            log('LISTEN ' + type + '  → ' + elKey(this) + '  ← ' + caller(), 'd');
        }
        return _ael.apply(this, arguments);
    };

    // Activity summary every 5s
    setInterval(function () {
        var oKeys = Object.keys(obsLog), eKeys = Object.keys(evtLog);
        if (oKeys.length || eKeys.length) {
            var parts = oKeys.map(function (k) { return k + ':' + obsLog[k]; });
            parts = parts.concat(eKeys.map(function (k) { return 'on-' + k + ':' + evtLog[k]; }));
            log('ACTIVITY  ' + parts.join('  '), 'd');
            obsLog = {};
        }
    }, 5000);

    // ── 8. DOM Depth ────────────────────────────────────────────────
    window.addEventListener('load', function () {
        var max = 0, deepEl = null;
        (function walk(el, d) {
            if (d > max) { max = d; deepEl = el; }
            for (var ch = el.children, i = 0; i < ch.length; i++) walk(ch[i], d + 1);
        })(document.body, 1);
        log('DOM DEPTH  ' + max + '  → ' + (deepEl ? elKey(deepEl) : '?'), max > 32 ? 'b' : max > 20 ? 'w' : 'd');
    });

    // ── Bar Metrics ─────────────────────────────────────────────────
    setInterval(function () {
        if (domEl) {
            var n = document.querySelectorAll('*').length;
            domEl.textContent = 'DOM ' + n;
            domEl.style.color = n > 3000 ? '#f44336' : n > 1500 ? '#ff9800' : '#ccc';
        }
        if (performance.memory && memEl)
            memEl.textContent = (performance.memory.usedJSHeapSize / 1048576).toFixed(1) + 'MB';
    }, 3000);

    // ── API ─────────────────────────────────────────────────────────
    window.__ndsPerf = {
        summary: function () {
            var avg = fpsH.length ? Math.round(fpsH.reduce(function (a, b) { return a + b; }, 0) / fpsH.length) : 'N/A';
            log('═══ SUMMARY ═══', 'i');
            log('  FPS avg:' + avg + '  min:' + (minFps === Infinity ? 'N/A' : minFps), 'i');
            log('  Janks: ' + janks + '  CLS: ' + clsTotal.toFixed(4), 'i');
            log('  DOM: ' + document.querySelectorAll('*').length, 'i');
            log('════════════════', 'i');
        },
        reset: function () {
            minFps = Infinity; fpsH = []; janks = 0; clsTotal = 0;
            if (logEl) logEl.innerHTML = ''; logLines = [];
            log('Reset', 'i');
        },
        stop: function () {
            cancelAnimationFrame(rafId);
            window.getComputedStyle = _gcs;
            Element.prototype.getBoundingClientRect = _gbcr;
            if (_RO) window.ResizeObserver = _RO;
            window.MutationObserver = _MO;
            if (_IO) window.IntersectionObserver = _IO;
            EventTarget.prototype.addEventListener = _ael;
        }
    };

    log('PAGE  ' + (document.title || location.pathname), 'i');
})();
</script>
