<script>
    // Pre-paint FOUC guard: stamp saved data-theme before first paint (NDS.Theme.init
    // handles the rest). Union-merged with any markup-authored/pack-stamped tokens so
    // a returning visitor's stored value never clobbers them.
    (function() {
        var v = localStorage.getItem('nds-theme');
        if (v) {
            var d = document.documentElement;
            var t = ((d.getAttribute('data-theme') || '') + ' ' + v).split(/\s+/)
                .filter(function (x, i, a) { return x && a.indexOf(x) === i; });
            d.setAttribute('data-theme', t.join(' '));
        }
    })();
</script>
<script>
    // Deferred asset loader — invoked from the main-CSS onload (head.html) so
    // the UI-icon tokens (and the HGI icon woff2 on content pages) never compete
    // with the critical bundle during the LCP window. The gate in critical-inline
    // / _skeleton ships --nds-icons-opacity:0; stamping html[data-nds-icons-loaded]
    // on the icons-sheet onload flips the var to 1, which every masked-pseudo
    // rule (`opacity: var(--nds-icons-opacity, 1)` next to its `mask:`) reads.
    function loadDeferredAssets() {
        var icons = document.createElement('link');
        icons.rel = 'stylesheet';
        icons.href = '{{ "assets/css/nds-icons.min.css" | relative_url }}?ver={{ site.asset_ver }}';
        icons.onload = function () { document.documentElement.setAttribute('data-nds-icons-loaded', ''); };
        document.head.appendChild(icons);
        {%- if site.use_hgi_font or page.use_hgi_font %}
        var hgi = document.createElement('link');
        hgi.rel = 'stylesheet';
        hgi.href = '{{ "assets/css/hgi-rounded-stroke-min.css" | relative_url }}?ver={{ site.asset_ver }}';
        document.head.appendChild(hgi);
        {%- endif %}
    }
    // A cached main.css can fire its onload while the parser is still paused at a
    // blocking stylesheet above this script — before loadDeferredAssets exists. The
    // onload then sets this flag instead, and the call is flushed here.
    if (window.__ndsDeferredPending) loadDeferredAssets();
</script>
