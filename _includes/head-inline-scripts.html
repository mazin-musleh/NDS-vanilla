<script>
    // [data-theme] pre-paint stamp — the inline <style> in critical-inline.html
    // reads it for body/sub-flat-hero bg.
    (function() {
        var t = localStorage.getItem('nds-theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
    })();
</script>
{%- if site.use_hgi_font or page.use_hgi_font %}
<script>
    // Deferred asset loader — invoked from the main-CSS onload (head.html) so the
    // HGI icon woff2 never competes with the critical bundle during the LCP window.
    function loadDeferredAssets() {
        var hgi = document.createElement('link');
        hgi.rel = 'stylesheet';
        hgi.href = '{{ "assets/css/hgi-rounded-stroke-min.css" | relative_url }}?ver={{ site.asset_ver }}';
        document.head.appendChild(hgi);
    }
</script>
{%- endif %}
