<aside class="nds-sideMenu" aria-label="Sidebar">
    <button id="sideMenuToggle" class="sideMenuToggle" aria-label="Sidebar Menu"></button>
    <nav>
        <ul class="topLevel">
            <li {% if page.url == "/" %} class="active"{% endif %}><a class="nds-btn nds-btn-subtle nds-btn-indicator" href="{{ '/' | relative_url }}"><span class="label">Home</span></a></li>
            <li class="has-sub{% if page.url contains '/button' or page.url contains '/tabs' or page.url contains '/accordion' %} open{% endif %}">
                <a  class="nds-btn nds-btn-subtle nds-btn-menu nds-btn-indicator" href="#" aria-haspopup="true" aria-expanded="{% if page.url contains '/button' or page.url contains '/tabs' or page.url contains '/accordion' %}true{% else %}false{% endif %}"><span class="label">Components</span></a>
                <ul>
                    <li{% if page.url contains '/accordion' %} class="active"{% endif %}><a class="nds-btn nds-btn-subtle" href="{{ '/accordion.html' | relative_url }}"><span class="label">Accordion</span></a></li>
                    <li{% if page.url contains '/button' %} class="active"{% endif %}><a class="nds-btn nds-btn-subtle" href="{{ '/button.html' | relative_url }}"><span class="label">Buttons</span></a></li>
                    <li{% if page.url contains '/tabs' %} class="active"{% endif %}><a class="nds-btn nds-btn-subtle" href="{{ '/tabs.html' | relative_url }}"><span class="label">Tabs</span></a></li>
                </ul>
            </li>
        </ul>
    </nav>
</aside>
