<head>
    {% assign site_title = page.siteTitle | default: site.title %}

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site_title }}</title>

    <!-- Critical CSS inline -->
    <style>
        :root {
            /* Navigation and layout (critical for initial render) */
            --nds-nav-height: 72px;
            --nds-minimal-nav-item-height: 40px;
            --nds-sideMenu-width: 260px;
            --nds-minimal-nav-bp: 768px;
            --nds-dropdown-safeZone: 24px;
            --nds-content-MaxWidth: 1280px;
            --nds-viewport-base-padding: 32px;
            --nds-transition-speed: .2;
            --shadow-md: 0px 2px 4px -2px rgba(16, 24, 40, .06), 0px 4px 8px -2px rgba(16, 24, 40, .1);
            --background-white: #fff;
        }

        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            padding: 0;
            margin: 0;
        }

        body {
            background-color: var(--background-body, #f9fafb);
            color: var(--text-default, #161616);
            font-size: var(--nds-text-md-FS, 16px);
            line-height: var(--nds-text-md-LH, 24px);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        body * {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        body.fullWidth {
            --nds-content-MaxWidth: 100%;
        }

        /* ===== MAIN CONTENT ===== */

        /* Hide icons until their specific fonts are loaded */
        i.hgi-stroke,
        i.hgi-solid {
            opacity: 0;
        }

        /* Show stroke icons when hgi-stroke-rounded is loaded */
        body[data-font-loaded*="hgi-stroke-rounded"] i.hgi-stroke {
            opacity: 1;
        }

        /* Show solid icons when hgi-solid-rounded is loaded */
        body[data-font-loaded*="hgi-solid-rounded"] i.hgi-solid {
            opacity: 1;
        }

        .textIcon {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: var(--spacing-xs, 4px);
            border: unset;
            background-color: transparent;
        }

        .nds-topbar {
            background-color: var(--background-neutral-100, #f3f4f6);
            height: 40px;
            z-index: 1000;
        }

        .nds-main-nav {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            background-color: var(--nds-nav-background-color, #fff);
            height: var(--nds-nav-height, 72px);
            box-shadow: var(--shadow-md, 0px 3.288px 6.575px -1.644px rgba(16, 24, 40, 0.10), 0px 1.644px 3.288px -1.644px rgba(16, 24, 40, 0.06));
            z-index: 1000;
        }

        #dgaDigitalStamp {
            display: none;
        }


        .nds-topbar>*,
        .nds-hero-section .nds-section-content,
        .nds-footer {
            display: none;
        }

        .contentLayout {
            visibility: hidden;
        }

        /* Override hidden attribute for NDS components to prevent CLS */
        /* Elements are invisible but still reserve layout space */
        [hidden].nds-tabs,
        [hidden].nds-drawer,
        [hidden].nds-swiper,
        [hidden].nds-breadcrumb-nav,
        [hidden].nds-user-feedback,
        [hidden].nds-footer {
            display: block;
            visibility: hidden;
            overflow-x: hidden;
            max-width: 300px;
        }

        .nds-breadcrumb,
        .nds-breadcrumb li {
            display: flex;
        }

        /* Hero Section Base Styles */
        .nds-hero-section {
            width: 100%;
            background-color: var(--background-sa-flag);
            position: relative;
            background-position: 50% 50%;
        }

        .nds-hero-section:not(.sub) {
            overflow: hidden;
            aspect-ratio: 16 / 9;
            max-height: 80svh;
        }

        /* Hero Sub Section */
        /* Fallback */
        .nds-hero-section.sub {
            background-image: linear-gradient(90deg,
                    transparent 0%,
                    var(--background-brand-light, #f3fcf6) 70%),
                var(--hero_image);
            background-position-x: left;
            background-size: cover;
            background-repeat: no-repeat;
            background-color: var(--background-brand-light, #f3fcf6);
            height: fit-content;
            min-height: 100px;
            box-shadow: inset 0px -2px 4px rgba(0, 0, 0, 0.05) !important;
            padding: var(--spacing-2xl, 20px) 0;
            border-radius: 0 !important;
        }

        html[dir="ltr"] .nds-hero-section.sub {
            background-image: linear-gradient(270deg,
                    transparent 0%,
                    var(--background-brand-light, #f3fcf6) 70%),
                var(--hero_image);
        }

        /* Progressive enhancement with color-mix */
        @supports (background: color-mix(in srgb, #000 0%, transparent)) {
            .nds-hero-section.sub {
                background-image: linear-gradient(90deg,
                        color-mix(in srgb, var(--background-brand-light, #f3fcf6) 0%, transparent) 0%,
                        color-mix(in srgb, var(--background-brand-light, #f3fcf6) 100%, transparent) 70%),
                    var(--hero_image);
            }

            html[dir="ltr"] .nds-hero-section.sub {
                background-image: linear-gradient(270deg,
                        color-mix(in srgb, var(--background-brand-light, #f3fcf6) 0%, transparent) 0%,
                        color-mix(in srgb, var(--background-brand-light, #f3fcf6) 100%, transparent) 70%),
                    var(--hero_image);
            }
        }


        .nds-hero-section.sub .nds-hero-image-wrapper {
            display: none;
        }

        .nds-hero-section.sub.flat {
            background: #fff !important;
            box-shadow: unset !important;
        }

        .nds-breadcrumb li::after {
            content: '';
            min-width: 24px;
        }

        /* Hero Image Wrapper */
        .nds-hero-image {
            width: 100%;
            height: 100%;
        }

        .nds-hero-section:not(.sub) .nds-hero-image {
            height: 600px;
        }

        .nds-hero-image-wrapper::before {
            --_overlay: var(--overlay, 0.20);
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(9, 42, 30, var(--_overlay)) 0%, rgba(9, 42, 30, var(--_overlay)) 100%);
            z-index: 2;
            pointer-events: none;
        }

        #nds-sharePage {
            display: none;
        }

        /* Swiper Styles */
        .nds-swiper.nds-hero {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        .nds-swiper.nds-hero .nds-swiper-slide {
            position: relative;
            background-size: cover;
            background-position: center;
            color: var(--text-oncolor-primary, #fff);
            overflow: hidden;
            height: 100%;
        }

        .nds-swiper-wrapper {
            height: 100%;
            display: flex;
        }

        .nds-swiper.nds-hero .nds-section-title,
        .nds-swiper.nds-hero .nds-section-description {
            color: var(--text-oncolor-primary, #fff);
        }


        /* Tablet Responsive */
        @media (max-width: 960px) {
            .nds-hero-section {
                height: 500px;
            }

        }

        /* Mobile Responsive */
        @media (max-width: 768px) {

            .nds-hero-section:not(.sub) .nds-section-content .nds-section-title::before {
                width: 80vw;
            }
        }

        #authorCopyright {
            color: var(--text-oncolor-primary, #fff);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--spacing-xs, 4px);
        }

        #authorCopyright:hover>span {
            text-decoration: underline;
        }
    </style>

    <!-- Preload critical resources -->
    {% if page.layout == 'home' or page.url == '/' %}
    <link rel="preload" as="image" href="{{ page.hero_image | default: site.hero_image | relative_url }}"
        imagesrcset="{{ page.hero_image_small | default: site.hero_image_small | relative_url }} 600w, {{ page.hero_image | default: site.hero_image | relative_url }} 1200w"
        imagesizes="100vw" fetchpriority="high">
    {% endif %}


    <!-- Critical CSS - Load with deferred loading -->
    <link rel="preload" href="{{ 'assets/css/nds.critical.min.css' | relative_url }}?ver=1.003" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="{{ 'assets/css/nds.critical.min.css' | relative_url }}?ver=1.003">
    </noscript>

    <!-- Main CSS - Load with deferred loading for below-the-fold content -->
    <link rel="preload" href="{{ 'assets/css/nds-main.min.css' | relative_url }}?ver=1.058" as="style"
        onload="this.onload=null;this.rel='stylesheet';loadDeferredAssets()">
    <noscript>
        <link rel="stylesheet" href="{{ 'assets/css/nds-main.min.css' | relative_url }}?ver=1.058">
    </noscript>



    <!-- Custom page-specific CSS files with deferred loading -->
    {% if page.custom_css %}
    {% for css_file in page.custom_css %}
    <link rel="preload" href="{{ css_file | relative_url }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="{{ css_file | relative_url }}">
    </noscript>
    {% endfor %}
    {% endif %}

    <!-- Deferred assets loaded after main CSS finishes -->
    <script>
        function loadDeferredAssets() {
            // Load icon font CSS
            var iconLink = document.createElement('link');
            iconLink.rel = 'stylesheet';
            iconLink.href = '{{ "assets/css/hgi-rounded-stroke-solid-min.css?ver=1.001" | relative_url }}';
            document.head.appendChild(iconLink);

            // Load favicon
            var favicon = document.createElement('link');
            favicon.rel = 'icon';
            favicon.type = 'image/svg+xml';
            favicon.href = '{{ "assets/img/favicon.svg" | relative_url }}';
            document.head.appendChild(favicon);
        }
    </script>
    <noscript>
        <link rel="stylesheet" href="{{ 'assets/css/hgi-rounded-stroke-solid-min.css' | relative_url }}">
        <link rel="icon" type="image/svg+xml" href="{{ 'assets/img/favicon.svg' | relative_url }}">
    </noscript>
</head>
