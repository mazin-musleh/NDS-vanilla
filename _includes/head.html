<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

    <!-- Persist fonts-loaded state across navigations -->
    <script>
      try {
        if (localStorage.getItem('nds-fonts-loaded') === '1') {
          document.documentElement.classList.add('fonts-loaded');
        }
        
      } catch (e) {}
    </script>

    <!-- Preload primary text fonts (limit to above-the-fold weights) -->
    <link rel="preload" as="font" type="font/woff2" href="{{ '/assets/fonts/IBMPlexSansArabic-Regular.woff2' | relative_url }}" crossorigin>
    <link rel="preload" as="font" type="font/woff2" href="{{ '/assets/fonts/IBMPlexSansArabic-Bold.woff2' | relative_url }}" crossorigin>

    <!-- Critical CSS inline -->
    <style>
        :root {
            /* Navigation and layout (critical for initial render) */
            --nds-nav-height: 72px;
            --nds-minimal-nav-item-height: 40px;
            --nds-sideMenu-width: 260px;
            --nds-minimal-nav-bp: 768px;
            --nds-dropdown-safeZone: 40px;
            --nds-content-MaxWidth: 1280px;
            --nds-viewport-base-padding: 32px;
            --nds-transition-speed: .2;
        }

        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;

        }

        body {
            background-color: var(--background-body, #f9fafb);
            color: var(--text-default, #161616);
            font-size: var(--nds-text-md-FS, 16px);
            line-height: var(--nds-text-md-LH, 24px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body * {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }

        body.toEdge {
            --nds-content-MaxWidth: 100%;
        }

        /* ===== MAIN CONTENT ===== */

        i.hgi {
            opacity: 0;
        }

        /* Only apply when body confirms icon font is loaded */
        body.hgi-loaded i.hgi {
            opacity: 1;
        }

        .textIcon {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: var(--spacing-xs, 4px);
            border: unset;
            background-color: transparent;
        }

        .hidden {
            display: none !important;
        }

        /* ===== CONTENT CONTAINER ===== */
        .nds-content-container {
            max-width: var(--nds-content-MaxWidth, 1280px);
            margin: 0 auto;
            padding: 0 var(--nds-viewport-padding, 32px);
        }

        .nds-topbar {
            background-color: var(--background-neutral-100, #f3f4f6);
            height: 40px;
            z-index: 1050;
        }

        nav.nds-main-nav {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            background-color: var(--nds-nav-background-color, #fff);
            height: var(--nds-nav-height, 72px);
            box-shadow: var(--shadow-md, 0px 3.288px 6.575px -1.644px rgba(16, 24, 40, 0.10), 0px 1.644px 3.288px -1.644px rgba(16, 24, 40, 0.06));
            z-index: 1000;
        }

        #dgaDigitalStamp {
            display: none;
        }


        .nds-topbar>*,
        nav.nds-main-nav>*,
        .nds-heroContent,
        .contentLayout,
        .nds-footer {
            display: none;
        }

        .nds-breadcrumb, .nds-breadcrumb li {
            display: flex;
        }

        /* Hero Section Base Styles */
        .nds-hero-section {
            height: 600px;
            background-color: #1B8354;
            position: relative;
            background-position: 50% 50%;
        }

        .nds-hero-section:not(.sub) {
            overflow: hidden;
        }

        /* Hero Sub Section */
        /* Fallback */
        .nds-hero-section.sub {
            background-image: linear-gradient(90deg,
                    transparent 0%,
                    var(--background-brand-light, #f3fcf6) 70%),
                var(--hero_image);
            background-position-x: left;
            background-size: cover;
            background-repeat: no-repeat;
            background-color: var(--background-brand-light, #f3fcf6);
            height: fit-content;
            min-height: 100px;
            box-shadow: inset 0px -2px 4px rgba(0, 0, 0, 0.05);
            padding: var(--spacing-2xl, 20px) 0;
        }

        html[dir="ltr"] .nds-hero-section.sub {
            background-image: linear-gradient(270deg,
                    transparent 0%,
                    var(--background-brand-light, #f3fcf6) 70%),
                var(--hero_image);
        }

        /* Progressive enhancement with color-mix */
        @supports (background: color-mix(in srgb, #000 0%, transparent)) {
            .nds-hero-section.sub {
                background-image: linear-gradient(90deg,
                        color-mix(in srgb, var(--background-brand-light, #f3fcf6) 0%, transparent) 0%,
                        color-mix(in srgb, var(--background-brand-light, #f3fcf6) 100%, transparent) 70%),
                    var(--hero_image);
            }

            html[dir="ltr"] .nds-hero-section.sub {
                background-image: linear-gradient(270deg,
                        color-mix(in srgb, var(--background-brand-light, #f3fcf6) 0%, transparent) 0%,
                        color-mix(in srgb, var(--background-brand-light, #f3fcf6) 100%, transparent) 70%),
                    var(--hero_image);
            }
        }


        .nds-hero-section.sub .nds-hero-image-wrapper,
        .nds-hero-section.sub .nds-hero-shape {
            display: none;
        }

        .nds-breadcrumb li::after {
            content: '';
            min-width: 24px;
        }

        /* Hero Image Wrapper */
        .nds-hero-image {
            width: 100%;
            height: 100%;
        }

        .nds-hero-section:not(.sub) .nds-hero-image {
            height: 600px;
        }

        .nds-hero-image-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(9, 42, 30, 0.80) 0%, rgba(9, 42, 30, 0.80) 100%);
            z-index: 2;
            pointer-events: none;
        }

        
        #nds-sharePage {
            display: none;
        }

        /* Hero Shape */
        .nds-hero-shape {
            position: absolute;
            z-index: -1;
            opacity: 0.8;
            transform: translate(60%, -60%);
            top: 50%;
        }

        html[dir="ltr"] .nds-hero-shape {
            transform: translate(-60%, -60%);
        }

        .nds-hero-shape>img,
        .nds-hero-shape>svg {
            height: 1100px;
            width: auto;
            pointer-events: none;
        }

        html[dir="ltr"] .nds-hero-shape>img,
        html[dir="ltr"] .nds-hero-shape>svg {
            transform: scaleX(-1);
        }

        /* Swiper Styles */
        .swiper.nds-heroSwiper {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        .swiper.nds-heroSwiper .swiper-slide {
            position: relative;
            background-size: cover;
            background-position: center;
            color: var(--text-oncolor-primary, #fff);
            overflow: hidden;
            height: 100%;
        }

        .swiper.nds-heroSwiper .swiper-button-prev,
        .swiper.nds-heroSwiper .swiper-button-next {
            color: var(--text-oncolor-primary, #fff) !important;
        }

        .swiper.nds-heroSwiper .swiper-pagination-bullet {
            background-color: var(--background-white, #fff) !important;
            opacity: 0.6;
        }

        .swiper.nds-heroSwiper .swiper-pagination-bullet-active {
            opacity: 1;
        }

        .swiper-wrapper {
            height: 100%;
        }

        .swiper-pagination-bullet {
            width: 14px;
            height: 14px;
            margin: 0 8px !important;
        }

        /* Tablet Responsive */
        @media (max-width: 768px) {
            .nds-hero-section {
                height: 500px;
            }

            .nds-hero-shape>img,
            .nds-hero-shape>svg {
                height: 800px;
            }

            .nds-hero-shape {
                transform: translate(55%, -50%);
            }

            html[dir="ltr"] .nds-hero-shape {
                transform: translate(-55%, -50%);
            }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {

            .nds-hero-section:not(.sub) .nds-heroContent .nds-heroTitle::before {
                width: 80vw;
            }
        }

        @media (max-width: 768px) {
            .nds-hero-shape {
                transform: translate(60%, -50%);
            }

            html[dir="ltr"] .nds-hero-shape {
                transform: translate(-60%, -50%);
            }
        }

        .cookie-popup {
            display: none;

        }

        #authorCopyright {
            color: var(--text-oncolor-primary, #fff);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--spacing-xs, 4px);
        }

        #authorCopyright:hover>span {
            text-decoration: underline;
        }
    </style>

    <!-- Load CSS files -->
    <link rel="preload" href="{{ '/assets/css/nds-main.min.css' | relative_url }}?ver=1.029" as="style"
        onload="this.onload=null;this.rel='stylesheet'" fetchpriority="high">
    <noscript>
        <link rel="stylesheet" href="{{ '/assets/css/nds-main.min.css' | relative_url }}">
    </noscript>

    <!-- Preload critical resources -->
    {% if page.layout == 'home' or page.url == '/' %}
    <link rel="preload" href="{{ page.hero_image | default: site.hero_image | relative_url }}" as="image"
        fetchpriority="high">
    {% endif %}

    <!-- Preload icon CSS (loads icon font via CSS) -->

    <link rel="preload" href="{{ '/assets/css/hgi-rounded-stroke-solid-min.css?ver=1.001' | relative_url }}" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="{{ '/assets/css/hgi-rounded-stroke-solid-min.css' | relative_url }}">
    </noscript>

    <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">
</head>
