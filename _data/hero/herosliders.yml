# Hero Slider Configuration
# ─────────────────────────
# Each slide supports:
#   src:        Background image path (required)
#   src_small:  Mobile background image path
#   overlay:    Background overlay opacity (0-1, default: 0.7)
#   position:   Background image position (default: "center center")
#   class:      Custom CSS class added to the slide
#
# Default content (title/description/button):
#   title:       Slide heading
#   description: Slide paragraph
#   url:         "Read More" button link (omit or "#" to hide button)
#
# Custom content (replaces default title/description/button):
#   content: |
#     <img src="{relative_url}/assets/img/logo.svg" alt="Logo">
#     <h1 class="nds-section-title">Custom Title</h1>
#     <p class="nds-section-description">Custom text</p>
#
#
#   Use {relative_url} for any paths — resolves to site baseurl (works from any page).

- src: assets/img/riyadhcenter_ai.webp
  src_small: assets/img/riyadhcenter3s.webp
  overlay: 0.7
  position: center 80%
  content: |
    <h1 class="nds-section-title">Vanilla Design System</h1>
    <p class="nds-section-description">An open-source, vanilla implementation of Saudi Arabia's National Design System. Production-ready HTML, CSS, and JavaScript built from scratch with zero external dependencies.</p>
    <div style="display:flex;gap:var(--spacing-md);flex-wrap:wrap;">
      <a href="https://github.com/mazin-musleh/NDS-vanilla" target="_blank" rel="noopener" class="nds-btn nds-primary nds-oncolor nds-lg nds-external"><i class="hgi hgi-stroke hgi-github"></i><span class="nds-label">View on GitHub</span></a>
      <a href="https://github.com/mazin-musleh/NDS-vanilla/releases/latest" target="_blank" rel="noopener" class="nds-btn nds-secondary-outline nds-oncolor nds-lg nds-external"><span class="nds-label">Download</span></a>
    </div>

