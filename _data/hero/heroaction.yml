# Hero Action Data — tags & action buttons for the sub hero section
#
# Resolution order:
#   1. page.hero_tags / page.hero_actions (inline front matter — highest priority)
#   2. _data/hero/{heroaction-value}.yml (set `heroaction: filename` in front matter)
#   3. _data/hero/heroaction.yml (this file — default fallback)
#
# Structure:
#   tags:     (optional) array of tag badges shown below the hero title
#   actions:  (optional) array of CTA buttons shown in the hero section
#   If no `actions` key exists, the entire file is treated as an actions array (legacy).
#
# ─── Tag fields ───
#   label:      (required) Tag text
#   style:      Tag variant: nds-neutral | nds-green | nds-blue | nds-orange | nds-red | nds-primary (default: nds-neutral)
#   icon:       HGI icon name, e.g. "hgi-star-01"
#   modifiers:  Extra classes, e.g. "nds-outline nds-rounded"
#
# ─── Action fields ───
#   label:          (required) Button text
#   url:            (required) Link URL
#   style:          Button variant (default: nds-primary)
#   icon:           HGI icon name, e.g. "hgi-arrow-right-01"
#   icon_position:  "trailing" to place icon after label (default: leading)
#   aria_label:     Custom aria-label for accessibility
#   target:         Link target, e.g. "_blank"
#
# ─── Example ───
# tags:
#   - label: "New Service"
#     style: "nds-green"
#     icon: "hgi-star-01"
#   - label: "Beta"
#     style: "nds-orange"
#
# actions:
#   - label: "Get Started"
#     url: "/services"
#     style: "nds-primary"
#     icon: "hgi-arrow-right-01"
#   - label: "Learn More"
#     url: "/about"
#     style: "nds-secondary-outline"
