# Selectable brands for the topbar/demo switchers and NDS.Brand validation.
#
# Two kinds:
#   token brand  — recolors via [data-brand] slot overrides defined in the
#                  $brands map (_sass/themes/_brands.scss); ships in critical.
#   theme: true  — a standalone stylesheet theme (its own nds-theme-<value>.min.css,
#                  e.g. _sass/themes/_<value>.scss); NDS.Brand loads/unloads the
#                  stylesheet on switch instead of toggling [data-brand].
#
# Keep token-brand `value`s in sync with the $brands map keys; theme `value`s with
# the matching _sass/themes/_<value>.scss + assets/css/nds-theme-<value>.min.scss.
- value: crimson
  label: Crimson
- value: corporate
  label: Corporate
- value: sunset
  label: Sunset
- value: foundation-day
  label: Foundation Day
  theme: true
  # Self-contained event folder (paths relative to assets/). Omit css/js on a
  # theme to use the default assets/css|js/nds-theme-<value>.min.{css,js}.
  css: events/foundation_day/nds-theme-foundation-day.min.css
  js: events/foundation_day/nds-theme-foundation-day.min.js
