# Secondary Navigation Items
secondary_nav:
  - label: "Call to Action"
    url: "#"
    custom_class: "CTA"
    button_style: "nds-btn nds-primary nds-md nds-indicator"

  - label: "Search"
    icon: "hgi-search-01"
