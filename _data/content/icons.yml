# UI icons registered in _sass/_icons.scss, rendered as the catalog on components/icons.md.
# Ordered by family, not alphabetically: the catalog reads better when related glyphs sit together.
# scripts/add-icon.mjs appends a new icon to the end of its list, so move it into the right group.

