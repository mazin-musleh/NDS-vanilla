# Secondary Navigation Items
secondary_nav:
  - label: "Call to Action"
    url: "#"
    custom_class: "CTA"
    button_style: "nds-nav-link nds-btn nds-primary nds-md nds-indicator"

  - label: "Search"
    icon: "hgi-search-01"
    button_style: "nds-nav-link nds-btn nds-subtle nds-notification nds-indicator"
    custom_class: "iconOnly search PAB"
    has_dropdown: true
    dropdown_type: "search"

  - label: "Notifications"
    icon: "hgi-notification-02"
    custom_class: "iconOnly PAB"
    button_style: "nds-nav-link nds-btn nds-subtle nds-notification nds-indicator"
    badge: "3"
    has_dropdown: true
    dropdown_class: "widthFit"
    items:
      - label: "New comment on your post"
        icon: "hgi-message-01"
        url: "#"
      - label: "Your report is ready"
        icon: "hgi-file-02"
        url: "#"
      - label: "System update available"
        icon: "hgi-refresh-02"
        url: "#"
      - label: "View all notifications"
        icon: "hgi-notification"
        url: "/notifications"

  - label: "Ahmed"
    icon: "hgi-user"
    avatar: true
    img_icon: "assets/img/avatar3.png"
    custom_class: "login iconOnly"
    button_style: "nds-nav-link nds-btn nds-subtle nds-lg nds-indicator"
    has_dropdown: true
    dropdown_type: "user"
    dropdown_class: "widthFit"
    user_name: "Ahmed Mohammed"
    user_role: "System Administrator"
    user_email: "ahmed@example.gov.sa"
    items:
      - label: "Portal"
        icon: "hgi-identity-card"
        url: "#"
      - label: "Change Password"
        icon: "hgi-lock-password"
        url: "#"
      - label: "Change Number"
        icon: "hgi-smart-phone-01"
        url: "#"
      - label: "Logout"
        icon: "hgi-door-01"
        button_style: "nds-subtle nds-destructive"
        url: "#"

  - label: "Toggle theme"
    icon: "hgi-moon-02"
    custom_class: "iconOnly"
    id: "ndsThemeToggle"

  - label: "English"
    icon: "hgi-translation"
    custom_class: "iconOnly lang"
    id: "langToggleBtn"
