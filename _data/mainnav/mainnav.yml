# ============================================================
# Main Navigation Configuration
# ============================================================
# Each page can override this file via front matter: mainnav: "filename"
# Files live in _data/mainnav/ and partials in _includes/
#
# Item Properties:
# ──────────────────────────────────────────────────────────────
# label          - Display text for the nav item
# url            - Link URL (renders <a>). Omit for <button>
# icon           - HGI icon class (e.g. "hgi-search-01")
# img_icon       - Image path instead of icon
# avatar         - true to wrap img_icon in nds-avatar
# badge          - Badge text on the icon (e.g. "3")
# id             - HTML id attribute
# custom_class   - Extra CSS classes on the <li>
# button_style   - Override button classes (default: nds-nav-link nds-btn nds-subtle nds-indicator)
# attr           - Arbitrary HTML attributes (e.g. "hidden", 'data-role="admin"')
#
# Content Properties:
# ──────────────────────────────────────────────────────────────
# type           - "dropdown" or "modal" (controls container and behavior)
# template       - Partial file in _includes/ (e.g. "mainnav-search.html")
# content_class  - Extra classes on container (e.g. "nds-fit", "nds-sm")
# content_source - Data file key in _data/content/ (for data-driven partials)
# content_label  - Field name to display from content_source (default: "title")
# content_limit  - Max items to show from content_source (default: 3)
# items          - Inline sub-items array (label, icon, url)
#
# Type Behavior:
# ──────────────────────────────────────────────────────────────
# dropdown  - Renders template inside nds-dropdown-menu (inside nav)
# modal     - Renders template inside nds-modal nds-card (outside nav)
#             Button gets data-modal-target, modal id = "{label-slugified}-modal"
# (none)    - Plain link or button, no content container
# ============================================================

# Branding (overrides site-level defaults from _config.yml)
# brandLogo: assets/img/custom-logo.svg
# headerBrandW: 150
# headerBrandH: 48
# brandName: Custom Brand
# brandNameColor: "#333"
# brandSlogan: Custom Slogan
# brandSloganColor: "#666"

# ──────────────────────────────────────────────────────────────
# Primary Navigation
# ──────────────────────────────────────────────────────────────
primary_nav:
  - label: "Item 1"
    url: "/"

  - label: "Item 2"

    template: "mainnav-column-view.html"
    type: "dropdown"
    content_source: "nav-item2"

  - label: "Item 3"

    template: "mainnav-row-list.html"
    type: "dropdown"
    content_source: "nav-item3"

  - label: "Item 4"
    url: "/services"

  - label: "Item 5"
    url: "/contact"

  - label: "Item 6"
    url: "/contact"

# ──────────────────────────────────────────────────────────────
# Actions Navigation
# ──────────────────────────────────────────────────────────────
actions_nav:
  - label: "Search"
    icon: "nds-hgi-search-01"
    button_style: "nds-nav-link nds-btn nds-subtle nds-indicator"
    custom_class: "nds-icon-only nds-search nds-PAB"
    template: "mainnav-search.html"
    type: "dropdown"

  - label: "Notifications"
    icon: "nds-hgi-notification-02"
    custom_class: "nds-icon-only nds-PAB"
    button_style: "nds-nav-link nds-btn nds-subtle nds-indicator"
    content_source: "notifications"
    template: "mainnav-notifications.html"
    type: "dropdown"
    content_class: "nds-fit"

  - label: "Login"
    icon: "nds-icon-avatar"
    custom_class: "nds-icon-only nds-guest"
    template: "mainnav-login.html"
    type: "modal"
    content_class: "nds-sm"

  - label: "Ahmed"
    icon: "nds-icon-avatar"
    avatar: true
    img_icon: "assets/img/avatar3.png"
    custom_class: "nds-login nds-icon-only nds-auth"
    button_style: "nds-nav-link nds-btn nds-subtle nds-lg nds-indicator"

    template: "mainnav-user.html"
    type: "dropdown"
    content_class: "nds-fit"

  - label: "English"
    icon: "nds-hgi-translation"
    custom_class: "nds-icon-only lang"
    data_attr: "data-lang-toggle"

  - label: "Call to Action"
    url: "#"
    custom_class: "nds-CTA"
    button_style: "nds-btn nds-primary"
