name: Auto-close pull requests

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const msg = [
              "Thanks for the interest in NDS! :wave:",
              "",
              "**Pull requests are currently not being accepted.** The project is in an issues-only period while v1 stabilizes and the maintainer processes initial community feedback.",
              "",
              "Please close this PR and open an issue instead:",
              "",
              "- [Report a bug](https://github.com/mazin-musleh/NDS-vanilla/issues/new?template=bug_report.yml)",
              "- [Request a feature](https://github.com/mazin-musleh/NDS-vanilla/issues/new?template=feature_request.yml)",
              "- [Ask a question in Discussions](https://github.com/mazin-musleh/NDS-vanilla/discussions)",
              "",
              "Watch the repo for the announcement when PRs reopen. Thank you!"
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: msg,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed",
            });
