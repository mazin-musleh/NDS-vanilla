<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}" dir="{{ page.direction | default: 'ltr' }}">
{%- include head.html %}
<body class="nds-minimal {{ page.body_class }}">
    <header>
        {%- include topbar.html %}
        {%- include mainNav.html %}
    </header>
    <main>
        {{ content }}
    </main>
    {%- include footer.html %}
    <!-- Scripts -->
    <script defer src="{{ 'assets/js/nds-main.min.js' | relative_url }}?ver=1.123"></script>
    {%- unless page.exclude_showcase == true %}
    <link rel="stylesheet" href="{{ 'assets/css/nds-showcase.min.css' | relative_url }}?ver=1.000">
    <script defer src="{{ 'assets/js/nds-showcase.min.js' | relative_url }}?ver=1.023"></script>
    {%- endunless %}
    {%- if page.custom_js %}
    {%- for js_file in page.custom_js %}
    <script defer src="{{ js_file | relative_url }}"></script>
    {%- endfor %}
    {%- endif %}
</body>
</html>
