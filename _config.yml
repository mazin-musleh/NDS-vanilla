title: "NDS - Vanilla National Design System"
version: 1.0.3
description: "An open-source, vanilla implementation of Saudi Arabia's National Design System. Production-ready HTML, CSS, and JavaScript built from scratch with zero dependencies."

baseurl: "/NDS-vanilla"

# HGI icon font from CDN: loads the font site-wide when true so any
# `<i class="hgi hgi-stroke hgi-NAME">` markup in content/demo/doc pages renders.
# UI icons always render via mask-image regardless.
use_hgi_font: true

# Set to true to show the dark/light theme toggle button in the topbar.
theme_switcher: true

# Jekyll server settings
port: 4002
host: 0.0.0.0  # Allow network access for mobile testing

# Brand Logo
brandLogo: assets/img/palm_swords.svg
headerBrandW: 40
headerBrandH: 40

# Brand Name
brandName: "NDS" #comment this to remove text from brand
brandNameColor: var(--text-display,#1f2a37)
brandSlogan: Vanilla Design System
brandSloganColor: var(--text-secondary-paragraph,#6c727e)

hero_image: assets/img/riyadhcenter_ai.webp
hero_image_small: assets/img/riyadhcenter3s.webp
hero_image_sub:
hero_image_pos: 50% 80%
hero_title: National Design System
hero_description: The National Design System provides comprehensive design guidelines, components, and resources for creating consistent and accessible digital experiences across government services in Saudi Arabia.

# Build settings
markdown: kramdown
highlighter: rouge
#theme: minima

# Sass configuration
sass:
  style: compressed
  sass_dir: _sass
  sourcemap: never

# Custom settings
author: Mazin Musleh
author_profile: https://www.linkedin.com/in/mazin-musleh/
license: MIT
repository_url: https://github.com/mazin-musleh/NDS-vanilla

# Language settings (RTL/LTR switching only)
lang: en
dir: ltr

# City location settings (Riyadh, Saudi Arabia)
city_latitude: 24.7136
city_longitude: 46.6753

# DGA Registration — replace with your real registration when deploying
dga_registration_number: "00000000000"
dga_registration_url: "#"

# Digital Stamp Content (multilingual)
digital_stamp:
  ar:
    tab_text_lg: 'موقع إلكتروني حكومي مسجل لدى هيئة الحكومة الرقمية.'
    tab_text_sm: 'موقع حكومي مسجل لدى هيئة الحكومة الرقمية'
    tab_verify_text: 'كيف تتحقق؟'
    domain_title: 'روابط المواقع الالكترونية الرسمية السعودية تنتهي بـ <span class="nds-digitalStamp-highlight">gov.sa</span>'
    domain_desc: 'جميع روابط المواقع الرسمية التابعة للجهات الحكومية في المملكة العربية السعودية تنتهي بـ .gov.sa'
    https_title: 'المواقع الالكترونية الحكومية تستخدم بروتوكول <span class="nds-digitalStamp-highlight">HTTPS</span> للتشفير و الأمان.'
    https_desc: 'المواقع الالكترونية الآمنة في المملكة العربية السعودية تستخدم بروتوكول HTTPS للتشفير.'
    register_text: 'مسجل لدى هيئة الحكومة الرقمية برقم:'
  en:
    tab_text_lg: 'A government website registered with the Digital Government Authority.'
    tab_text_sm: 'Government website registered with DGA'
    tab_verify_text: 'How you know?'
    domain_title: 'Official Saudi Government website URL ends with <span class="nds-digitalStamp-highlight">gov.sa</span>'
    domain_desc: 'Website belongs to an official government organization in the Kingdom of Saudi Arabia always ends with .gov.sa .'
    https_title: 'Official Secure websites use <span class="nds-digitalStamp-highlight">HTTPS</span>'
    https_desc: 'Secured governments websites in the Kingdom of Saudi Arabia use Https encryption.'
    register_text: 'Registered on Digital Government Authority:'

# Default navigation data files
mainnav: mainnav
sidemenu: sidemenu
footer: footer
footerlogos: footerlogos

# Default hero sliders data file
herosliders: herosliders


# Debug tools
debug: false  # Set to true to enable perf monitor overlay

# Plugins
plugins: []



# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - CLAUDE.md
  - .claude
  - .github
  - package.json
  - package-lock.json
  - scripts
  - nul
  - NUL
  - standard-page.md
  - subsite.md
  - class-rename-map.txt
  - README.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - CHANGELOG.md
  - LICENSE

