title: National Design System
description: The National Design System provides comprehensive design guidelines, components, and resources for creating consistent and accessible digital experiences across government services in Saudi Arabia.
baseurl: "/_site"
url: ""

# Brand Logo
brandLogo: /assets/img/DGA-logo.svg
headerBrandW: 132
headerBrandH: 42

# Hero Settings
hero_image: /assets/img/riyadhcenter.jpg
#hero_image_sub: /assets/img/sliderShapeGray.svg

# Build settings
markdown: kramdown
highlighter: rouge
#theme: minima

# Sass configuration
sass:
  style: compressed
  sass_dir: _sass

# Custom settings
author: Mazin Musleh
author_profile: https://www.linkedin.com/in/mazin-musleh/

# Localization settings
default_lang: en
languages: [en, ar]
lang: en
dir: ltr


# Plugins
#plugins:
  #- jekyll-feed
  #- jekyll-sitemap
plugins: []

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - CLAUDE.md