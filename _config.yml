title: "NDS - Vanilla National Design System"
version: 1.1.0
description: "An open-source, vanilla implementation of Saudi Arabia's National Design System. Production-ready HTML, CSS, and JavaScript built from scratch with zero dependencies."

baseurl: "/NDS-vanilla"
url: "https://mazin-musleh.github.io"  # production origin (no trailing slash); used by sitemap.xml / robots.txt

# HGI icon font from CDN: loads the font site-wide when true so any
# `<i class="hgi hgi-stroke hgi-NAME">` markup in content/demo/doc pages renders.
# UI icons always render via mask-image regardless.
use_hgi_font: true

# Set to true to show the dark/light theme toggle button in the topbar.
theme_switcher: true

# Set to true to show the brand switcher dropdown in the topbar — lets users pick
# a runtime brand (persisted in localStorage['nds-brand'], stamped pre-paint).
# Brands are defined in _sass/themes/_register.scss and ship in the critical bundle.
brand_switcher: true

# Accessibility add-on (FAB + panel + a11y mode overrides). When true, the page
# loads assets/css/nds-accessibility.min.css + assets/js/nds-accessibility.min.js,
# renders the accessibility-panel include, and runs the a11y FOUC guard. Set to
# false if you ship your own accessibility solution — the a11y baked into the
# core components (focus rings, ARIA, contrast, reduce-motion) is unaffected.
accessibility: true

# Critical-CSS load mode. Default (false): the critical file loads render-blocking
# (<link rel="stylesheet">) — fastest LCP/FCP on slow networks and cacheable across
# pages. Set true to instead ship an inline skeleton gate (auto-generated from
# _sass/_fold.scss, so it never drifts from the crit file) and load the crit file
# async — non-blocking first paint, for consumers who prefer it. Page front matter
# can opt a single page in with `critical_inline: true`.
critical_inline: true

# Default brand (re-branding). Empty = the built-in DGA default brand (no extra
# request). Set to a name matching assets/css/nds-theme-<name>.min.css to load
# that brand's slot overrides render-blocking (before first paint, no DGA→brand
# flash) on top of the DGA base. See components/theming for authoring.
brand:

# Jekyll server settings
port: 4002
host: 0.0.0.0  # Allow network access for mobile testing

# Brand Logo
brandLogo: assets/img/palm_swords.svg
headerBrandW: 40
headerBrandH: 40

# Brand Name
brandName: "NDS" #comment this to remove text from brand
brandNameColor: var(--text-display,#1f2a37)
brandSlogan: Vanilla Design System
brandSloganColor: var(--text-secondary-paragraph,#6c727e)

hero_image: assets/img/riyadhcenter_ai.webp
hero_image_small: assets/img/riyadhcenter3s.webp
hero_image_sub:
hero_image_pos: 50% 80%

# Social share card (Open Graph / Twitter), 1200x627. Per-page override: `og_image` in front matter.
og_image: assets/img/nds-cover.webp
hero_title: National Design System
hero_description: The National Design System provides comprehensive design guidelines, components, and resources for creating consistent and accessible digital experiences across government services in Saudi Arabia.

# Build settings
markdown: kramdown
highlighter: rouge
#theme: minima

# Sass configuration
sass:
  style: compressed
  sass_dir: _sass
  sourcemap: never

# Custom settings
author: Mazin Musleh
author_profile: https://www.linkedin.com/in/mazin-musleh/
license: MIT
repository_url: https://github.com/mazin-musleh/NDS-vanilla

# Language settings (RTL/LTR switching only)
lang: en
dir: ltr

# City location settings (Riyadh, Saudi Arabia)
city_latitude: 24.7136
city_longitude: 46.6753

# DGA Registration — replace with your real registration when deploying
dga_registration_number: "00000000000"
dga_registration_url: "#"

# Google Analytics — only rendered when Jekyll runs in production (JEKYLL_ENV=production,
# which GitHub Pages sets automatically). Leave empty to disable. Local `jekyll serve`
# defaults to development, so the snippet never ships during local dev.
google_analytics: "G-RP24HRW7CD"

