# Default navigation data files
mainnav: mainnav
sidemenu: sidemenu
footer: footer
footerlogos: footerlogos

# Default hero sliders data file
herosliders: herosliders


# Debug tools
debug: false          # true -> unminified JS bundle + loader [NDS:init] console logging (rerun js_processor.rb after toggling)
perf_monitor: false  # true -> on-page perf-monitor overlay panel (independent of debug)

# Plugins
plugins: []



# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - CLAUDE.md
  - .claude
  - .github
  - package.json
  - package-lock.json
  - scripts
  - nul
  - NUL
  - standard-page.md
  - subsite.md
  - README.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - CHANGELOG.md
  - LICENSE

