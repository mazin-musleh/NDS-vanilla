title: National Design System
description: The National Design System provides comprehensive design guidelines, components, and resources for creating consistent and accessible digital experiences across government services in Saudi Arabia.
baseurl: ""
url: "http://127.0.0.1:4001"

# Jekyll server settings
port: 4001

# Brand Logo
brandLogo: assets/img/Palm&Swords.svg
headerBrandW: 132
headerBrandH: 42

# Brand Name
brandName: "National Design System"

# Hero Settings
hero_image: assets/img/riyadhcenter.webp
#hero_image_sub: /assets/img/sliderShapeGray.svg

# Build settings
markdown: kramdown
highlighter: rouge
#theme: minima

# Sass configuration
sass:
  style: compressed
  sass_dir: _sass
  sourcemap: always

# Custom settings
author: Mazin Musleh
author_profile: https://www.linkedin.com/in/mazin-musleh/

# Language settings (RTL/LTR switching only)
lang: en
dir: ltr


# Plugins
#plugins:
  #- jekyll-feed
  #- jekyll-sitemap
plugins: []



# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - CLAUDE.md
